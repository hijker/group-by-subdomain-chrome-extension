<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Grouper Settings</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      width: 280px;
      padding: 16px;
      background: #fff;
      color: #15141a;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e0e0e6;
    }

    .header img {
      width: 32px;
      height: 32px;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #0060df;
    }

    .section {
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: #5b5b66;
      margin-bottom: 8px;
    }

    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
    }

    .toggle-label {
      font-size: 13px;
      color: #15141a;
    }

    .toggle-description {
      font-size: 11px;
      color: #5b5b66;
      margin-top: 2px;
    }

    /* Firefox-style toggle */
    .switch {
      position: relative;
      width: 40px;
      height: 20px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #b1b1b3;
      transition: 0.3s;
      border-radius: 20px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: 0.3s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: #0060df;
    }

    input:checked + .slider:before {
      transform: translateX(20px);
    }

    .btn {
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 8px;
    }

    .btn-primary {
      background: #0060df;
      color: white;
    }

    .btn-primary:hover {
      background: #003eaa;
    }

    .btn-secondary {
      background: #f0f0f4;
      color: #15141a;
    }

    .btn-secondary:hover {
      background: #e0e0e6;
    }

    .status {
      margin-top: 8px;
      padding: 8px;
      border-radius: 4px;
      font-size: 12px;
      text-align: center;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .status.show {
      opacity: 1;
    }

    .status.success {
      background: #e7ffd1;
      color: #058b00;
    }

    .footer {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #e0e0e6;
      font-size: 11px;
      color: #5b5b66;
      text-align: center;
    }

    .footer a {
      color: #0060df;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon32.png" alt="Icon">
    <h1>Tab Grouper</h1>
  </div>

  <div class="section">
    <div class="section-title">Settings</div>

    <div class="toggle-row">
      <div>
        <div class="toggle-label">Ignore "www" Prefix</div>
        <div class="toggle-description">Treat www.site.com same as site.com</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="ignoreWww" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div class="toggle-row">
      <div>
        <div class="toggle-label">Sort by Domain</div>
        <div class="toggle-description">Alphabetically sort groups</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="sortByDomain" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div class="toggle-row">
      <div>
        <div class="toggle-label">Show Tab Count</div>
        <div class="toggle-description">Display number of tabs per group</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="showTabCount" checked>
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Actions</div>
    <button class="btn btn-primary" id="openSidebar">Open Tab Groups Sidebar</button>
  </div>

  <div class="status" id="status"></div>

  <div class="footer">
    View grouped tabs in the <a href="#" id="sidebarLink">sidebar panel</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
