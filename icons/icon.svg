<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4285f4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a73e8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#grad1)"/>

  <!-- Tab group representation - 3 stacked rectangles -->
  <g fill="white">
    <!-- Top tab -->
    <rect x="28" y="32" width="72" height="16" rx="4" ry="4" opacity="0.9"/>
    <!-- Middle tab -->
    <rect x="28" y="54" width="72" height="16" rx="4" ry="4" opacity="0.75"/>
    <!-- Bottom tab -->
    <rect x="28" y="76" width="72" height="16" rx="4" ry="4" opacity="0.6"/>
  </g>

  <!-- Grouping bracket -->
  <path d="M22 38 L22 86 M22 62 L16 62" stroke="white" stroke-width="4" fill="none" stroke-linecap="round"/>
</svg>
